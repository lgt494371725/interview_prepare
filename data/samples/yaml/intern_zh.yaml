cards:
  - title: "数据分析实习生"
    period: "20XX.XX — 20XX.XX"
    company: "某科技公司（Example Corp）"
    tech_tags: [Python, SQL, Pandas, Tableau, Excel]
    sections:
      - title: "运营数据分析"
        bullets:
          - "负责营销活动全流程数据分析：SQL提取→Python/Pandas清洗→Tableau可视化→效果验证报告撰写"
          - "基于A/B测试与用户行为漏斗分析，量化评估点击率、转化率等核心KPI变化，为运营决策提供数据支撑"
          - "针对效果不及预期的活动，主动挖掘数据原因，提出优化方案"
      - title: "用户偏好预测模型"
        bullets:
          - "基于用户行为日志，构建多维特征工程，设计并计算\"偏好指数\""
          - "将偏好指数作为个性化推荐系统的辅助输入信号，提升推荐匹配度"

  - title: "后端开发实习生"
    period: "20XX.XX — 20XX.XX"
    company: "某软件公司（Sample Software Inc.）"
    tech_tags: [Python, Elasticsearch, SQL, Docker]
    sections:
      - title: "智能搜索系统功能开发"
        bullets:
          - "参与搜索系统后端开发，负责批量下载模块、异常词过滤等功能设计与实现"
          - "开发异常词过滤服务：构建敏感词库与正则匹配引擎，对搜索请求进行实时清洗"
      - title: "系统自动化部署"
        bullets:
          - "编写自动化安装脚本，实现一键环境配置与部署，缩短交付周期"
