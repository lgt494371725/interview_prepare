cards:
  - title: "データ分析インターン"
    period: "20XX.XX — 20XX.XX"
    company: "某テック企業（Example Corp）"
    summary: "マーケティング施策のデータ分析およびユーザー嗜好予測モデルの構築を担当"
    tech_tags: [Python, SQL, Pandas, Tableau, Excel]
    sections:
      - title: "運営データ分析"
        bullets:
          - "マーケティング施策の全データ分析フローを担当：SQLによるデータ抽出→Python/Pandasによるクリーニング→Tableauによる可視化→効果検証レポート作成"
          - "A/Bテスト結果とユーザー行動ファネル分析により、クリック率・転換率などの主要KPIの変化を定量的に評価し、運営チームの意思決定を支援"
          - "施策効果が期待を下回った場合、データから原因を掘り起こし、改善案を提案"
      - title: "ユーザー嗜好予測モデル"
        bullets:
          - "ユーザー行動ログをもとに多次元特徴量エンジニアリングを行い、「嗜好スコア」を算出"
          - "嗜好スコアを個別化レコメンドシステムの補助入力シグナルとして活用し、推薦精度を向上"

  - title: "バックエンド開発インターン"
    period: "20XX.XX — 20XX.XX"
    company: "某ソフトウェア企業（Sample Software Inc.）"
    summary: "企業向けスマート検索システムのバックエンド開発および自動デプロイを担当"
    tech_tags: [Python, Elasticsearch, SQL, Docker]
    sections:
      - title: "インテリジェント検索システムの機能開発"
        bullets:
          - "検索システムのバックエンド開発に参画。一括ダウンロードモジュール・異常語フィルタリング機構などを設計・実装"
          - "異常語フィルタリングサービスを開発。センシティブワードDB＋正規表現マッチングエンジンを構築"
      - title: "システム自動化デプロイ"
        bullets:
          - "自動化インストールスクリプトを作成し、ワンクリック環境構築・デプロイを実現。納品サイクルを大幅に短縮"
